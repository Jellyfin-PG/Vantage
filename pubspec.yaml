name: vantage
description: Jellyfin game library frontend — Flutter port
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter

  
  http: ^1.2.0

  
  flutter_svg: ^2.0.10+1

  
  flutter_secure_storage: ^9.0.0

  
  cached_network_image: ^3.3.1

  
  go_router: ^13.2.0

  
  path_provider: ^2.1.2
  path: ^1.9.0
  url_launcher: ^6.3.2
  gamepads: ^0.1.10+2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/vantage.svg

